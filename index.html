<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journey to Dum Dum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="remote-screen">
        <div class="remote-device" id="start-trigger">
            <button id="remote-btn"></button>
        </div>
        <p id="instruction-text">TAP THE REMOTE TO START THE JOURNEY</p>
    </div>

    <div id="scene-area" class="hidden">
        <div class="sky">
            <div class="cloud cloud1">☁️</div>
            <div class="cloud cloud2">☁️</div>
            <div class="bird">🐦</div>
        </div>
        
        <div class="station-scenery">
            <div class="trees">🌳 🌲 🌳</div>
            <div class="station-board">DUM DUM</div>
        </div>

        <div class="tracks"></div>

        <div id="train">
            🚂<span id="gift-box">🎁</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
